name: Deploy to Vercel

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - run: npm install

      - name: Deploy (production)
        if: github.ref == 'refs/heads/main'
        run: npx vercel --token=${{ secrets.VERCEL_TOKEN }} --yes --prod --name=iracing-setup-tool
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

      - name: Deploy (preview)
        if: github.ref != 'refs/heads/main'
        run: npx vercel --token=${{ secrets.VERCEL_TOKEN }} --yes --name=iracing-setup-tool
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
